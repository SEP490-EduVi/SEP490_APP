<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eduvi Offline Game Runtime</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Segoe UI, Helvetica, Arial, sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(120deg, #f5f7ff, #eaf6ff);
        color: #0f172a;
      }
      .layout {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .panel {
        width: min(820px, 100%);
        background: #ffffff;
        border: 1px solid #dce5f4;
        border-radius: 16px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }
      h1 { margin: 0 0 10px; font-size: 28px; }
      .meta { color: #475569; font-size: 14px; margin-bottom: 16px; }
      .status { margin-top: 10px; font-size: 14px; color: #334155; }
      pre {
        margin-top: 14px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 10px;
        padding: 10px;
        max-height: 180px;
        overflow: auto;
        font-size: 12px;
      }
      button {
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: #ffffff;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .hidden { display: none !important; }
      .btn-finish {
        margin-top: 14px;
        background: #0f766e;
        display: block;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        box-sizing: border-box;
      }

      /* â”€â”€ Game title â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      .game-title { margin: 0 0 4px; font-size: 22px; }
      .template-badge {
        display: inline-block;
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 14px;
      }

      /* â”€â”€ HOVER_SELECT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      .hs-prompt {
        font-size: 18px;
        font-weight: 600;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #dce5f4;
        background: #f8fbff;
        margin-bottom: 14px;
        line-height: 1.5;
      }
      .hs-choices {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .choice-btn {
        border: 1px solid #bed0ef;
        border-radius: 10px;
        background: #ffffff;
        color: #0f172a;
        text-align: left;
        padding: 12px;
        line-height: 1.45;
      }
      .choice-btn.correct { border-color: #16a34a; background: #ecfdf5; }
      .choice-btn.wrong { border-color: #dc2626; background: #fef2f2; }

      /* â”€â”€ DRAG_DROP â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      .dd-prompt {
        font-size: 17px;
        font-weight: 600;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #dce5f4;
        background: #f8fbff;
        margin-bottom: 6px;
        line-height: 1.5;
      }
      .dd-hint { font-size: 13px; color: #64748b; margin-bottom: 10px; }
      .dd-zones {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .zone-box {
        flex: 1 1 160px;
        min-height: 72px;
        border: 2px dashed #94a3b8;
        border-radius: 10px;
        padding: 10px;
        background: #f8fafc;
        text-align: center;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .zone-box:hover { background: #eff6ff; border-color: #3b82f6; }
      .zone-box.matched-correct { border: 2px solid #16a34a; background: #ecfdf5; cursor: default; }
      .zone-box.flash-wrong { background: #fef2f2; border-color: #dc2626; }
      .dd-items { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
      .item-btn {
        background: #e0e7ff;
        color: #3730a3;
        border: 2px solid #c7d2fe;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .item-btn.selected { background: #818cf8; color: #fff; border-color: #6366f1; }
      .item-btn.matched { opacity: 0.45; cursor: default; }
      .dd-score { font-size: 14px; color: #475569; margin-bottom: 4px; }

      /* â”€â”€ SNAKE_DUEL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      .sd-legend { display: flex; gap: 16px; font-size: 13px; margin-bottom: 10px; }
      .sd-scoreboard {
        font-size: 15px;
        font-weight: 600;
        padding: 10px 14px;
        background: #f1f5f9;
        border-radius: 10px;
        margin-bottom: 12px;
      }
      .sd-question {
        font-size: 18px;
        font-weight: 600;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #dce5f4;
        background: #f8fbff;
        margin-bottom: 12px;
        line-height: 1.5;
      }
      .sd-choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
      .sd-choice-row {
        padding: 10px 14px;
        border: 1px solid #dce5f4;
        border-radius: 10px;
        background: #fff;
        font-size: 15px;
      }
      .sd-choice-row.correct { border-color: #16a34a; background: #ecfdf5; }
      .sd-label { font-weight: 700; color: #6366f1; margin-right: 6px; }
      .sd-feedback { font-size: 14px; color: #475569; margin-bottom: 6px; min-height: 20px; }
      .p1 { color: #dc2626; font-weight: 600; }
      .p2 { color: #2563eb; font-weight: 600; }
      .p1.wrong, .p2.wrong { opacity: 0.7; }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Eduvi Game Runtime (Offline)</h1>
        <div id="meta" class="meta">Loading launch contract...</div>
        <div id="game-container"></div>
        <div id="status" class="status">Chua co thao tac.</div>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="./runtime.js"></script>
  </body>
</html>
