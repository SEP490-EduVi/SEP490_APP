<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eduvi Offline Game Runtime</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Segoe UI, Helvetica, Arial, sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(120deg, #f5f7ff, #eaf6ff);
        color: #0f172a;
      }
      .layout {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .panel {
        width: min(720px, 100%);
        background: #ffffff;
        border: 1px solid #dce5f4;
        border-radius: 16px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      .meta {
        color: #475569;
        font-size: 14px;
      }
      .row {
        margin-top: 16px;
        display: flex;
        gap: 10px;
      }
      .question {
        margin-top: 16px;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #dce5f4;
        background: #f8fbff;
        font-size: 18px;
        font-weight: 600;
      }
      .choices {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .choice {
        border: 1px solid #bed0ef;
        border-radius: 10px;
        background: #ffffff;
        color: #0f172a;
        text-align: left;
        padding: 12px;
        line-height: 1.45;
      }
      .choice.correct {
        border-color: #16a34a;
        background: #ecfdf5;
      }
      .choice.wrong {
        border-color: #dc2626;
        background: #fef2f2;
      }
      .status {
        margin-top: 10px;
        font-size: 14px;
        color: #334155;
      }
      button {
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: #ffffff;
        padding: 10px 14px;
        cursor: pointer;
      }
      button.secondary {
        background: #0f766e;
      }
      pre {
        margin-top: 14px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 10px;
        padding: 10px;
        max-height: 230px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Eduvi Game Runtime (Offline)</h1>
        <div id="meta" class="meta">Loading launch contract...</div>
        <div id="question" class="question">Dang tai noi dung game...</div>
        <div id="choices" class="choices"></div>
        <div id="status" class="status">Chua co thao tac.</div>
        <div class="row">
          <button id="save">Save Snapshot</button>
          <button id="finish" class="secondary">Finish Session</button>
        </div>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="./runtime.js"></script>
  </body>
</html>
